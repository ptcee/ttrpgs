<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>ptc ttrpgs!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cambay:ital,wght@0,400;0,700;1,400;1,700&family=Crete+Round:ital@0;1&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Crete Round", serif;
            font-weight: 400;
            font-style: normal;
            font-size: 16px;
            margin: 0;
            padding: 0;
        }

        .wrap {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ADD100;
            /* fallback for old browsers */
            background: -webkit-linear-gradient(to top, #7B920A, #ADD100);
            /* Chrome 10-25, Safari 5.1-6 */
            background: linear-gradient(to top, #7B920A, #ADD100);
            /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */


        }

        .card {
            border-radius: 12px;
            padding: 18px 20px;
            margin: 16px;
            background-color: rgba(154, 154, 154, 0.4);
            box-shadow: 0px 5px 5px rgba(0, 0, 0, 0.2); 
            width: 500px;
        }

        hr {
            border: none;
            border-top: 1px solid #fff;
            margin: 10px 0;
            width: 300px;
        }

        h1 {
            font-size: 2em;
            color: #ffffff;
        }

        nav {
            display: flex;
            flex-direction: column;
            width: 300px;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 10vh auto;
        }



        button {
            outline: 0;
            grid-gap: 8px;
            align-items: center;
            background-color: #77b8076b;
            color: #ffffff;
            border: 1px solid #94ff86;
            border-radius: 4px;
            cursor: pointer;
            display: inline-flex;
            flex-shrink: 0;
            font-size: 16px;
            gap: 8px;
            justify-content: center;
            line-height: 1.5;
            overflow: hidden;
            padding: 12px 16px;
            text-decoration: none;
            text-overflow: ellipsis;
            transition: all .14s ease-out;
            white-space: nowrap;
            width: 400px;
        }

        button:hover {
            box-shadow: 4px 4px 0 #000;
            transform: translate(-4px, -4px);
        }

        button:focus-visible {
            outline-offset: 1px;
        }

        a {
            text-decoration: none;
            color: #fff;
        }

        .wip {
            filter: saturate(20%);
        }
    </style>
</head>

<body>
    <div class="wrap">

        <div class="card">
            <nav>
                <h1>ptc rpg</h1>
                <hr>
                <button><a href="lootgobs/">LOOT GOBLINS</a></button>
                <button><a href="osrad/">OSRad.</a></button>
                <button class="wip">IRON</button>
            </nav>
        </div>
    </div>

</body>

</html>
